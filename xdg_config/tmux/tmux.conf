set -g mouse on
set-option -g focus-events on
set -g extended-keys on
set -g extended-keys-format csi-u

# zellij-like keybindings
set -g prefix C-g
unbind C-b

set -s escape-time 300 
set -g repeat-time 1000

bind-key p switch-client -T pane-mode

bind-key -T pane-mode -r h select-pane -L
bind-key -T pane-mode -r j select-pane -D
bind-key -T pane-mode -r k select-pane -U
bind-key -T pane-mode -r l select-pane -R
bind-key -T pane-mode n split-window -h
bind-key -T pane-mode x split-window -v

bind-key r switch-client -T resize-mode

bind-key -T resize-mode -r h resize-pane -L 5
bind-key -T resize-mode -r j resize-pane -D 5
bind-key -T resize-mode -r k resize-pane -U 5
bind-key -T resize-mode -r l resize-pane -R 5

# VSCode Ctrl+J-like toggle for a right-side pane (hide/show without killing)
bind-key Enter if-shell -F '#{==:#{window_panes},1}' \
  'split-window -h -p 35' \
  'if-shell -F "#{window_zoomed_flag}" "resize-pane -Z \; select-pane -R" "if-shell -F \"#{pane_at_right}\" \"select-pane -L \; resize-pane -Z\" \"resize-pane -Z \; select-pane -R\""'

set -g status-style "bg=#{?#{==:#{client_key_table},pane-mode},red,#{?#{==:#{client_key_table},resize-mode},blue,black}},fg=white"

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
if-shell -b '[ "$(uname)" = "Linux" ]' {
  set -s copy-command "xsel --clipboard --input"
  display "using xsel as copy-command"
}
if-shell -b '[ "$(uname)" = "Darwin" ]' {
  set -s copy-command "pbcopy"
  display "using pbcopy as copy-command"
}
