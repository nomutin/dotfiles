[env]
AWS_CONFIG_FILE = "${XDG_CONFIG_HOME}/aws/config"
AWS_SHARED_CREDENTIALS_FILE = "${XDG_CONFIG_HOME}/aws/credentials"
DOCKER_CONFIG = "${XDG_CONFIG_HOME}/docker"
NPM_CONFIG_USERCONFIG = "${XDG_CONFIG_HOME}/npm/npmrc"
PI_CONFIG_DIR = "${XDG_CONFIG_HOME}/pi"
PI_CODING_AGENT_DIR = "${XDG_DATA_HOME}/pi/agent"

[tools]
aws = "latest"
bun = "latest"
github-cli = "latest"
tmux = "latest"
lazydocker = "latest"
node = "latest"
pi = "latest"
uv = "latest"

# LSP
"npm:bash-language-server" = { version = "latest", depends = ["bun"] }
lua-language-server = "latest"
tombi = "0.9.22"
ty = "latest"
"npm:vscode-langservers-extracted" = { version = "latest", depends = ["bun"] }
"npm:@vtsls/language-server" = { version = "latest", depends = ["bun"] }
"npm:yaml-language-server" = { version = "latest", depends = ["bun"] }

# Linter/Formatter
"npm:markuplint" = { version = "latest", depends = ["bun"] }
shellcheck = "latest"
shfmt = "latest"
stylua = "latest"

# MacOS
"github:machlit/cutler" = { version = "latest", os = ["macos"] }
colima = { version = "latest", os = ["macos"] }
docker-cli = { version = "latest", os = ["macos"] }
docker-compose = { version = "latest", os = ["macos"] }
lima = { version = "latest", os = ["macos"] }
"llama.cpp" = { version = "latest", version_prefix = "b", os = ["macos"] }
"aqua:ouch-org/ouch" = { version = "latest", os = ["macos"] }

[settings.npm]
package_manager = "bun"

