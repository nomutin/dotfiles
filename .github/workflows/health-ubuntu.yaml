name: Ubuntu

on:
  pull_request:
    branches:
      - master

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
      - name: Install
        run: bash install.sh
        env:
          GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify ll command
        run: bash -ic 'type ll >/dev/null'
      - name: Verify jq command
        run: bash -ic 'jq --version >/dev/null'
      - name: Verify
        run: bash -ic 'xxxxxxxxxxx >/dev/null'
