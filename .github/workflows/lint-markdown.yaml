name: Lint Markdown

on:
  pull_request:
    branches:
      - master
    paths:
      - "**/*.md"

jobs:
  linting:
    name: Lint Markdown Files
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
      - name: Run markdownlint
        run: npx markdownlint-cli@0.44.0 "**/*.md" --ignore node_modules
