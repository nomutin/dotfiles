name: Lint TOML

on:
  pull_request:
    branches:
      - master
    paths:
      - "**/*.toml"

jobs:
  linting:
    name: Lint TOML Files
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
      - name: Run taplo
        run: npx @taplo/cli@0.9.3 fmt --check
